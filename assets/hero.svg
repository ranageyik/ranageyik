<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Rana Geyik — Designer, Developer and Entrepreneur</title>
  <desc id="desc">An animated experimental banner with colorful orbits, a creative grid and Rana Geyik's professional identity.</desc>
  <defs>
    <linearGradient id="bg" x1="80" y1="20" x2="1120" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#080B16"/>
      <stop offset="0.48" stop-color="#11102A"/>
      <stop offset="1" stop-color="#07151B"/>
    </linearGradient>
    <linearGradient id="spectrum" x1="250" y1="90" x2="980" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF7A18"/>
      <stop offset="0.34" stop-color="#FF3D9A"/>
      <stop offset="0.67" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#2DD4BF"/>
    </linearGradient>
    <linearGradient id="textGradient" x1="280" y1="130" x2="930" y2="280" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF7ED"/>
      <stop offset="0.45" stop-color="#F5D0FE"/>
      <stop offset="1" stop-color="#CCFBF1"/>
    </linearGradient>
    <radialGradient id="glowA">
      <stop stop-color="#FF3D9A" stop-opacity="0.62"/>
      <stop offset="1" stop-color="#FF3D9A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB">
      <stop stop-color="#2DD4BF" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#2DD4BF" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" stroke="#FFFFFF" stroke-opacity="0.055"/>
    </pattern>
    <filter id="blur32" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="32"/>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="frame"><rect width="1200" height="420" rx="32"/></clipPath>
  </defs>

  <style>
    .orbit { transform-box: fill-box; transform-origin: center; animation: spin 18s linear infinite; }
    .orbit.reverse { animation-direction: reverse; animation-duration: 26s; }
    .float-a { animation: floatA 7s ease-in-out infinite; }
    .float-b { animation: floatB 9s ease-in-out infinite; }
    .dash { stroke-dasharray: 11 16; animation: dash 9s linear infinite; }
    .cursor { animation: blink 1.05s steps(1,end) infinite; }
    .pulse { animation: pulse 3.4s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes floatA { 0%,100% { transform: translate(0,0); } 50% { transform: translate(18px,-12px); } }
    @keyframes floatB { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-14px,16px); } }
    @keyframes dash { to { stroke-dashoffset: -108; } }
    @keyframes blink { 0%,48% { opacity:1; } 49%,100% { opacity:0; } }
    @keyframes pulse { 0%,100% { transform:scale(1); opacity:.7; } 50% { transform:scale(1.28); opacity:1; } }
    @media (prefers-reduced-motion: reduce) {
      .orbit,.float-a,.float-b,.dash,.cursor,.pulse { animation:none; }
    }
  </style>

  <g clip-path="url(#frame)">
    <rect width="1200" height="420" fill="url(#bg)"/>
    <rect width="1200" height="420" fill="url(#grid)"/>

    <circle class="float-a" cx="132" cy="88" r="118" fill="url(#glowA)" filter="url(#blur32)"/>
    <circle class="float-b" cx="1080" cy="330" r="142" fill="url(#glowB)" filter="url(#blur32)"/>

    <g opacity="0.85">
      <ellipse class="orbit" cx="985" cy="154" rx="154" ry="78" transform="rotate(-18 985 154)" stroke="url(#spectrum)" stroke-width="2"/>
      <ellipse class="orbit reverse" cx="985" cy="154" rx="113" ry="52" transform="rotate(25 985 154)" stroke="#FFFFFF" stroke-opacity="0.22"/>
      <circle class="pulse" cx="1118" cy="116" r="7" fill="#FF7A18" filter="url(#softGlow)"/>
      <circle class="pulse" cx="887" cy="204" r="5" fill="#2DD4BF" filter="url(#softGlow)" style="animation-delay:-1.2s"/>
    </g>

    <path class="dash" d="M58 342C216 274 275 382 430 320C584 258 662 362 815 304C947 254 1023 290 1150 236" stroke="url(#spectrum)" stroke-opacity="0.55" stroke-width="2"/>

    <g transform="translate(76 62)">
      <rect x="0" y="0" width="142" height="32" rx="16" fill="#FFFFFF" fill-opacity="0.07" stroke="#FFFFFF" stroke-opacity="0.12"/>
      <circle cx="18" cy="16" r="5" fill="#2DD4BF" class="pulse"/>
      <text x="32" y="21" fill="#D1FAE5" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="700" letter-spacing="1.8">BUILD MODE</text>
    </g>

    <text x="72" y="178" fill="url(#textGradient)" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="76" font-weight="800" letter-spacing="-3">RANA GEYİK</text>
    <text x="76" y="226" fill="#E9D5FF" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="23" font-weight="600" letter-spacing="1.8">DESIGNER × DEVELOPER × ENTREPRENEUR</text>
    <rect class="cursor" x="765" y="205" width="3" height="28" rx="1.5" fill="#FF3D9A"/>

    <g transform="translate(76 260)" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="13" font-weight="600" letter-spacing="0.8">
      <rect width="186" height="38" rx="19" fill="#FF3D9A" fill-opacity="0.1" stroke="#FF3D9A" stroke-opacity="0.42"/>
      <text x="20" y="24" fill="#FBCFE8">AI-NATIVE SYSTEMS</text>
      <rect x="198" width="176" height="38" rx="19" fill="#8B5CF6" fill-opacity="0.11" stroke="#A78BFA" stroke-opacity="0.42"/>
      <text x="219" y="24" fill="#DDD6FE">PRODUCT BUILDER</text>
      <rect x="386" width="166" height="38" rx="19" fill="#2DD4BF" fill-opacity="0.1" stroke="#2DD4BF" stroke-opacity="0.42"/>
      <text x="407" y="24" fill="#CCFBF1">CREATIVE TECH</text>
    </g>

    <g transform="translate(934 294) rotate(-7)">
      <rect width="184" height="70" rx="18" fill="#0B1220" fill-opacity="0.78" stroke="url(#spectrum)" stroke-width="1.4"/>
      <text x="18" y="29" fill="#F8FAFC" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" font-weight="800" letter-spacing="1.2">NOW BUILDING</text>
      <text x="18" y="52" fill="#FDA4AF" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="800">BİZMOTO ↗</text>
    </g>
  </g>
  <rect x="1" y="1" width="1198" height="418" rx="31" stroke="url(#spectrum)" stroke-opacity="0.38" stroke-width="2"/>
</svg>

